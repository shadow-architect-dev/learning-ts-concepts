<svg xmlns="http://www.w3.org/2000/svg" width="1060" height="660" viewBox="0 0 1060 660">
  <defs>
    <!-- Background grid -->
    <pattern id="grid" width="20" height="20" patternUnits="userSpaceOnUse">
      <path d="M 20 0 L 0 0 0 20" fill="none" stroke="#f1f5f9" stroke-width="1" />
    </pattern>
    <!-- Card Shadow -->
    <filter id="shadow" x="-8%" y="-8%" width="116%" height="116%">
      <feDropShadow dx="0" dy="4" stdDeviation="4" flood-color="#0f172a" flood-opacity="0.08" />
    </filter>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="8" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
    <!-- Connection Markers -->
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 1.5 L 8 5 L 0 8.5 z" fill="#64748b" />
    </marker>
    <marker id="arrow-blue" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 1.5 L 8 5 L 0 8.5 z" fill="#3b82f6" />
    </marker>
    <marker id="arrow-green" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 1.5 L 8 5 L 0 8.5 z" fill="#10b981" />
    </marker>
  </defs>

  <style>
    .font-all { font-family: Inter, system-ui, -apple-system, sans-serif; }
    .title-main { font-size: 22px; font-weight: 800; fill: #0f172a; }
    .title-sub { font-size: 13px; fill: #64748b; }
    .vpc-box { fill: #fcfdfe; stroke: #475569; stroke-width: 2.5; stroke-dasharray: 6 6; rx: 16; }
    .vpc-label { font-size: 14px; font-weight: 700; fill: #475569; }
    .az-line { stroke: #cbd5e1; stroke-width: 1.5; stroke-dasharray: 4 4; }
    .az-label { font-size: 12px; font-weight: 600; fill: #94a3b8; }
    
    /* Subnet Styles */
    .subnet-public { fill: #fffbeb; stroke: #f59e0b; stroke-width: 1.5; rx: 12; }
    .subnet-private { fill: #eff6ff; stroke: #3b82f6; stroke-width: 1.5; rx: 12; }
    .subnet-isolated { fill: #ecfdf5; stroke: #10b981; stroke-width: 1.5; rx: 12; }
    .subnet-title { font-size: 11px; font-weight: 700; }
    .subnet-title.pub { fill: #b45309; }
    .subnet-title.priv { fill: #1d4ed8; }
    .subnet-title.iso { fill: #047857; }

    /* Card Styles */
    .card { fill: #ffffff; stroke: #e2e8f0; stroke-width: 1; rx: 8; }
    .card-title { font-size: 12px; font-weight: 700; fill: #1e293b; }
    .card-subtitle { font-size: 10px; fill: #64748b; font-family: monospace; }
    
    /* Connections */
    .flow-line { stroke: #64748b; stroke-width: 2; fill: none; stroke-linecap: round; }
    .flow-line-blue { stroke: #3b82f6; stroke-width: 2; fill: none; stroke-linecap: round; }
    .flow-line-green { stroke: #10b981; stroke-width: 2; fill: none; stroke-linecap: round; }
    .flow-line-dash { stroke: #94a3b8; stroke-width: 1.5; fill: none; stroke-dasharray: 4 4; }
    .port-badge { fill: #f1f5f9; stroke: #cbd5e1; stroke-width: 1; rx: 4; }
    .port-text { font-size: 10px; font-weight: 700; fill: #475569; text-anchor: middle; font-family: monospace; }
  </style>

  <!-- Background Canvas -->
  <rect width="100%" height="100%" fill="#f8fafc" />
  <rect width="100%" height="100%" fill="url(#grid)" />

  <g class="font-all">
    <!-- Header -->
    <text x="40" y="45" class="title-main">3-AZ 3-Tier Web Architecture</text>
    <text x="40" y="65" class="title-sub">AWS CDK Stack: ThreeTierStack (dev / stg / prod)</text>

    <!-- Legend (Top Right) -->
    <g transform="translate(710, 20)">
      <rect x="0" y="0" width="310" height="40" fill="#ffffff" stroke="#e2e8f0" rx="6" filter="url(#shadow)" />
      
      <circle cx="20" cy="20" r="6" fill="#f59e0b" />
      <text x="32" y="24" font-size="11" font-weight="600" fill="#1e293b">Public</text>

      <circle cx="100" cy="20" r="6" fill="#3b82f6" />
      <text x="112" y="24" font-size="11" font-weight="600" fill="#1e293b">Private</text>

      <circle cx="180" cy="20" r="6" fill="#10b981" />
      <text x="192" y="24" font-size="11" font-weight="600" fill="#1e293b">Isolated (DB)</text>
    </g>

    <!-- Outer Systems -->
    <!-- Internet Cloud -->
    <g transform="translate(35, 180)" filter="url(#shadow)">
      <rect x="0" y="0" width="110" height="90" class="card" />
      <!-- Cloud Icon -->
      <path d="M 55 25 C 48 25, 43 30, 43 36 C 37 37, 33 42, 33 48 C 33 54, 38 59, 44 59 L 76 59 C 81 59, 86 54, 86 48 C 86 43, 82 38, 77 37 C 76 30, 70 25, 63 25 C 60 25, 57 26, 55 28 Z" fill="#94a3b8" />
      <text x="55" y="75" text-anchor="middle" font-size="12" font-weight="700" fill="#334155">Internet</text>
    </g>

    <!-- VPC Outer Container -->
    <g transform="translate(190, 80)">
      <rect width="830" height="540" class="vpc-box" />
      <text x="20" y="28" class="vpc-label">VPC (10.0.0.0/16)</text>
      
      <!-- Internet Gateway on VPC Border -->
      <g transform="translate(-18, 110)" filter="url(#shadow)">
        <circle cx="18" cy="18" r="18" fill="#3b82f6" />
        <!-- IGW Symbol -->
        <path d="M 10 18 L 26 18 M 18 10 L 18 26 M 13 13 L 23 23 M 13 23 L 23 13" stroke="#ffffff" stroke-width="2" stroke-linecap="round" />
        <text x="42" y="22" font-size="10" font-weight="700" fill="#1d4ed8">IGW</text>
      </g>

      <!-- AZ Columns Boundaries (Dashed Lines) -->
      <line x1="270" y1="45" x2="270" y2="520" class="az-line" />
      <line x1="550" y1="45" x2="550" y2="520" class="az-line" />

      <!-- AZ Labels -->
      <text x="145" y="40" text-anchor="middle" class="az-label">Availability Zone A</text>
      <text x="410" y="40" text-anchor="middle" class="az-label">Availability Zone B</text>
      <text x="675" y="40" text-anchor="middle" class="az-label">Availability Zone C</text>

      <!-- ==================== SUBNET LAYER 1: PUBLIC ==================== -->
      <!-- Subnet A - Public -->
      <g transform="translate(15, 60)">
        <rect width="245" height="130" class="subnet-public" />
        <text x="10" y="18" class="subnet-title pub">Public Subnet A (10.0.0.0/24)</text>
        
        <!-- NAT Gateway -->
        <g transform="translate(25, 35)" filter="url(#shadow)">
          <rect width="195" height="75" class="card" />
          <!-- NAT Gateway Icon -->
          <circle cx="28" cy="38" r="14" fill="#f59e0b" opacity="0.2" />
          <path d="M 22 38 L 34 38 M 28 32 L 28 44 M 24 34 L 32 42" stroke="#f59e0b" stroke-width="2" stroke-linecap="round" />
          <text x="52" y="36" class="card-title">NAT Gateway</text>
          <text x="52" y="52" class="card-subtitle">nat-gateway-a</text>
          <text x="52" y="64" font-size="9" fill="#94a3b8">Provides Egress</text>
        </g>
      </g>

      <!-- Subnet B - Public -->
      <g transform="translate(280, 60)">
        <rect width="245" height="130" class="subnet-public" />
        <text x="10" y="18" class="subnet-title pub">Public Subnet B (10.0.1.0/24)</text>

        <!-- ALB Card (Spans conceptually, placed in B for layout) -->
        <g transform="translate(25, 35)" filter="url(#shadow)">
          <rect width="195" height="75" class="card" style="stroke: #f59e0b; stroke-width: 1.5;" />
          <!-- ALB Icon -->
          <circle cx="28" cy="38" r="14" fill="#f59e0b" opacity="0.2" />
          <path d="M 20 38 L 25 38 M 31 38 L 36 38 M 28 26 C 28 26, 23 32, 28 38 C 33 32, 28 26, 28 26 Z M 28 38 C 28 38, 23 44, 28 50 C 33 44, 28 38, 28 38 Z" fill="#f59e0b" />
          <text x="52" y="36" class="card-title">ALB (Security Group)</text>
          <text x="52" y="52" class="card-subtitle">albSecurityGroup</text>
          <text x="52" y="64" font-size="9" fill="#b45309" font-weight="600">Port 80 / 443 Inbound</text>
        </g>
      </g>

      <!-- Subnet C - Public -->
      <g transform="translate(545, 60)">
        <rect width="245" height="130" class="subnet-public" />
        <text x="10" y="18" class="subnet-title pub">Public Subnet C (10.0.2.0/24)</text>
        <text x="122" y="75" text-anchor="middle" font-size="10" fill="#d97706" font-style="italic">Spare Capacity</text>
      </g>


      <!-- ==================== SUBNET LAYER 2: PRIVATE ==================== -->
      <!-- Subnet A - Private -->
      <g transform="translate(15, 210)">
        <rect width="245" height="140" class="subnet-private" />
        <text x="10" y="18" class="subnet-title priv">Private Subnet A (10.0.8.0/24)</text>

        <!-- ECS Task A -->
        <g transform="translate(25, 35)" filter="url(#shadow)">
          <rect width="195" height="85" class="card" />
          <!-- Fargate Icon -->
          <circle cx="28" cy="42" r="14" fill="#3b82f6" opacity="0.2" />
          <rect x="21" y="35" width="14" height="14" rx="2" fill="none" stroke="#3b82f6" stroke-width="2" />
          <circle cx="28" cy="42" r="3" fill="#3b82f6" />
          <text x="52" y="34" class="card-title">ECS Task (Fargate)</text>
          <text x="52" y="48" class="card-subtitle">Container Port: 3000</text>
          <text x="52" y="60" class="card-subtitle">Image: ecs-sample</text>
          <text x="52" y="72" font-size="9" fill="#3b82f6" font-weight="600">Env: dev/stg/prod</text>
        </g>
      </g>

      <!-- Subnet B - Private -->
      <g transform="translate(280, 210)">
        <rect width="245" height="140" class="subnet-private" />
        <text x="10" y="18" class="subnet-title priv">Private Subnet B (10.0.9.0/24)</text>

        <!-- ECS Task B -->
        <g transform="translate(25, 35)" filter="url(#shadow)">
          <rect width="195" height="85" class="card" />
          <!-- Fargate Icon -->
          <circle cx="28" cy="42" r="14" fill="#3b82f6" opacity="0.2" />
          <rect x="21" y="35" width="14" height="14" rx="2" fill="none" stroke="#3b82f6" stroke-width="2" />
          <circle cx="28" cy="42" r="3" fill="#3b82f6" />
          <text x="52" y="34" class="card-title">ECS Task (Fargate)</text>
          <text x="52" y="48" class="card-subtitle">Container Port: 3000</text>
          <text x="52" y="60" class="card-subtitle">Image: ecs-sample</text>
          <text x="52" y="72" font-size="9" fill="#3b82f6" font-weight="600">Env: dev/stg/prod</text>
        </g>
      </g>

      <!-- Subnet C - Private -->
      <g transform="translate(545, 210)">
        <rect width="245" height="140" class="subnet-private" />
        <text x="10" y="18" class="subnet-title priv">Private Subnet C (10.0.10.0/24)</text>

        <!-- ECS Task C -->
        <g transform="translate(25, 35)" filter="url(#shadow)">
          <rect width="195" height="85" class="card" />
          <!-- Fargate Icon -->
          <circle cx="28" cy="42" r="14" fill="#3b82f6" opacity="0.2" />
          <rect x="21" y="35" width="14" height="14" rx="2" fill="none" stroke="#3b82f6" stroke-width="2" />
          <circle cx="28" cy="42" r="3" fill="#3b82f6" />
          <text x="52" y="34" class="card-title">ECS Task (Fargate)</text>
          <text x="52" y="48" class="card-subtitle">Container Port: 3000</text>
          <text x="52" y="60" class="card-subtitle">Image: ecs-sample</text>
          <text x="52" y="72" font-size="9" fill="#3b82f6" font-weight="600">Env: dev/stg/prod</text>
        </g>
      </g>


      <!-- ==================== SUBNET LAYER 3: ISOLATED ==================== -->
      <!-- Subnet A - Isolated -->
      <g transform="translate(15, 370)">
        <rect width="245" height="140" class="subnet-isolated" />
        <text x="10" y="18" class="subnet-title iso">Isolated Subnet A (10.0.16.0/24)</text>

        <!-- Aurora Writer -->
        <g transform="translate(25, 35)" filter="url(#shadow)">
          <rect width="195" height="85" class="card" style="stroke: #10b981; stroke-width: 1.5;" />
          <!-- RDS DB Icon -->
          <circle cx="28" cy="42" r="14" fill="#10b981" opacity="0.2" />
          <path d="M 20 34 C 20 31, 36 31, 36 34 L 36 50 C 36 53, 20 53, 20 50 Z M 20 39 C 20 42, 36 42, 36 39 M 20 44 C 20 47, 36 47, 36 44" stroke="#10b981" stroke-width="2" stroke-linecap="round" fill="none" />
          <text x="52" y="34" class="card-title" fill="#047857">Aurora DB (Writer)</text>
          <text x="52" y="48" class="card-subtitle" fill="#065f46">Serverless v2 Primary</text>
          <text x="52" y="60" class="card-subtitle">Port: 3306 (MySQL)</text>
          <text x="52" y="72" font-size="9" font-weight="600" fill="#059669">Auto Scaling ACU</text>
        </g>
      </g>

      <!-- Subnet B - Isolated -->
      <g transform="translate(280, 370)">
        <rect width="245" height="140" class="subnet-isolated" />
        <text x="10" y="18" class="subnet-title iso">Isolated Subnet B (10.0.17.0/24)</text>

        <!-- Aurora Reader -->
        <g transform="translate(25, 35)" filter="url(#shadow)">
          <rect width="195" height="85" class="card" />
          <!-- RDS DB Icon -->
          <circle cx="28" cy="42" r="14" fill="#10b981" opacity="0.2" />
          <path d="M 20 34 C 20 31, 36 31, 36 34 L 36 50 C 36 53, 20 53, 20 50 Z M 20 39 C 20 42, 36 42, 36 39 M 20 44 C 20 47, 36 47, 36 44" stroke="#10b981" stroke-width="2" stroke-linecap="round" fill="none" />
          <text x="52" y="34" class="card-title">Aurora DB (Reader)</text>
          <text x="52" y="48" class="card-subtitle">Serverless v2 Replica</text>
          <text x="52" y="60" class="card-subtitle">Port: 3306 (MySQL)</text>
          <text x="52" y="72" font-size="9" fill="#94a3b8">Read Replica</text>
        </g>
      </g>

      <!-- Subnet C - Isolated -->
      <g transform="translate(545, 370)">
        <rect width="245" height="140" class="subnet-isolated" />
        <text x="10" y="18" class="subnet-title iso">Isolated Subnet C (10.0.18.0/24)</text>

        <!-- Aurora Reader -->
        <g transform="translate(25, 35)" filter="url(#shadow)">
          <rect width="195" height="85" class="card" />
          <!-- RDS DB Icon -->
          <circle cx="28" cy="42" r="14" fill="#10b981" opacity="0.2" />
          <path d="M 20 34 C 20 31, 36 31, 36 34 L 36 50 C 36 53, 20 53, 20 50 Z M 20 39 C 20 42, 36 42, 36 39 M 20 44 C 20 47, 36 47, 36 44" stroke="#10b981" stroke-width="2" stroke-linecap="round" fill="none" />
          <text x="52" y="34" class="card-title">Aurora DB (Reader)</text>
          <text x="52" y="48" class="card-subtitle">Serverless v2 Replica</text>
          <text x="52" y="60" class="card-subtitle">Port: 3306 (MySQL)</text>
          <text x="52" y="72" font-size="9" fill="#94a3b8">Read Replica</text>
        </g>
      </g>
    </g>

    <!-- ==================== FLOW CONNECTIONS (ARROWS) ==================== -->
    <!-- 1. Internet to ALB -->
    <path d="M 145 225 L 172 225 M 190 225 L 430 225 Q 480 225 490 200 L 495 185" class="flow-line" marker-end="url(#arrow)" />
    
    <!-- Port 80/443 Badge on Internet -> ALB line -->
    <g transform="translate(260, 212)">
      <rect width="70" height="20" class="port-badge" />
      <text x="35" y="14" class="port-text">HTTPS :443</text>
    </g>

    <!-- 2. ALB to ECS Tasks -->
    <!-- From ALB bottom (approx x=577, y=180 in global coordinates = VPC x=190 + Subnet B offset 280 + ALB offset 25 + 195/2 = 592, y=80 + 60 + 35 + 75 = 250) -->
    <!-- Split lines from ALB to Tasks A, B, C -->
    <!-- ALB center bottom: x=592, y=250 -->
    <!-- Task A center top: x=327, y=325 (Global: VPC x=190 + Subnet A 15 + Task 25 + 195/2 = 327, y=80 + 210 + 35 = 325) -->
    <!-- Task B center top: x=592, y=325 -->
    <!-- Task C center top: x=857, y=325 -->
    <path d="M 592 250 L 592 275" class="flow-line-blue" />
    <path d="M 592 275 L 327 275 L 327 320" class="flow-line-blue" marker-end="url(#arrow-blue)" />
    <path d="M 592 275 L 592 320" class="flow-line-blue" marker-end="url(#arrow-blue)" />
    <path d="M 592 275 L 857 275 L 857 320" class="flow-line-blue" marker-end="url(#arrow-blue)" />

    <!-- Port 3000 Badge on ALB -> ECS lines -->
    <g transform="translate(680, 265)">
      <rect width="65" height="20" class="port-badge" />
      <text x="32.5" y="14" class="port-text">HTTP :3000</text>
    </g>

    <!-- 3. ECS Tasks to Aurora DB (Primary Writer & Readers via Connections API) -->
    <!-- Task A bottom: x=327, y=410 (VPC x=190 + Subnet A 15 + Task 25 + 195/2 = 327, y=80 + 210 + 35 + 85 = 410) -->
    <!-- Task B bottom: x=592, y=410 -->
    <!-- Task C bottom: x=857, y=410 -->
    <!-- Writer top: x=327, y=485 (VPC x=190 + Subnet A 15 + Writer 25 + 195/2 = 327, y=80 + 370 + 35 = 485) -->
    <!-- Reader B top: x=592, y=485 -->
    <!-- Reader C top: x=857, y=485 -->
    <path d="M 327 410 L 327 480" class="flow-line-green" marker-end="url(#arrow-green)" />
    <path d="M 592 410 L 592 480" class="flow-line-green" marker-end="url(#arrow-green)" />
    <path d="M 857 410 L 857 480" class="flow-line-green" marker-end="url(#arrow-green)" />
    
    <!-- Replication link between Writer and Readers -->
    <path d="M 445 527 L 495 527" class="flow-line-dash" marker-end="url(#arrow)" />
    <path d="M 710 527 L 760 527" class="flow-line-dash" marker-end="url(#arrow)" />
    <text x="470" y="520" text-anchor="middle" font-size="8" fill="#64748b" font-weight="600">Replicate</text>
    <text x="735" y="520" text-anchor="middle" font-size="8" fill="#64748b" font-weight="600">Replicate</text>

    <!-- Port 3306 Badge on ECS -> RDS line -->
    <g transform="translate(337, 435)">
      <rect width="65" height="20" class="port-badge" />
      <text x="32.5" y="14" class="port-text">MySQL :3306</text>
    </g>

    <!-- 4. ECS Tasks Egress connection to NAT Gateway (for pulling images, APIs, etc.) -->
    <!-- Connect Task A/B/C top to NAT GW center bottom: x=327, y=250 -->
    <path d="M 327 325 L 327 250" class="flow-line-dash" />
    <path d="M 592 325 L 592 300 L 350 300 Q 327 300 327 285 L 327 250" class="flow-line-dash" />
    <!-- NAT GW to IGW for Internet access -->
    <!-- NAT GW top: x=327, y=175. IGW: x=172, y=210 -->
    <path d="M 327 175 L 327 155 Q 327 135 300 135 L 205 135 L 205 180" class="flow-line-dash" marker-end="url(#arrow)" />
    <text x="250" y="130" font-size="9" font-weight="600" fill="#64748b">Egress to Internet</text>
  </g>
</svg>
