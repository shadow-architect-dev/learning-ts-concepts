name: Continuous Deployment

on:
  push:
    branches:
      - main
      - develop
      - 'release/*'

permissions:
  id-token: write # OIDC認証を使用するために必須
  contents: read  # リポジトリのチェックアウトに必須

jobs:
  deploy:
    name: Deploy to AWS Fargate
    runs-on: ubuntu-latest

    steps:
      # 1. リポジトリのチェックアウト
      - name: Checkout Code
        uses: actions/checkout@v4

      # 2. ブランチに基づくデプロイ環境の動的決定（本番・開発環境の分離）
      # AWSアカウントIDや地域はリポジトリのSecretsまたはVariablesに登録することを想定しています
      - name: Set Environment Variables
        run: |
          AWS_ACCOUNT_ID="${{ secrets.AWS_ACCOUNT_ID }}"
          AWS_REGION="${{ secrets.AWS_REGION || 'ap-northeast-1' }}"
          
          if [ "${{ github.ref_name }}" = "main" ]; then
            echo "ENV_NAME=prod" >> $GITHUB_ENV
            echo "AWS_ROLE_ARN=arn:aws:iam::$AWS_ACCOUNT_ID:role/github-actions-deploy-role-prod" >> $GITHUB_ENV
            echo "ECR_REPO=app-repo-prod" >> $GITHUB_ENV
            echo "CDK_STACK=ThreeTierStack-prod" >> $GITHUB_ENV
          elif [[ "${{ github.ref_name }}" =~ ^release/ ]]; then
            echo "ENV_NAME=stg" >> $GITHUB_ENV
            echo "AWS_ROLE_ARN=arn:aws:iam::$AWS_ACCOUNT_ID:role/github-actions-deploy-role-stg" >> $GITHUB_ENV
            echo "ECR_REPO=app-repo-stg" >> $GITHUB_ENV
            echo "CDK_STACK=ThreeTierStack-stg" >> $GITHUB_ENV
          else
            echo "ENV_NAME=dev" >> $GITHUB_ENV
            # 開発ブランチ(developなど)はdev環境スタックへデプロイします
            echo "AWS_ROLE_ARN=arn:aws:iam::$AWS_ACCOUNT_ID:role/github-actions-deploy-role-dev" >> $GITHUB_ENV
            echo "ECR_REPO=app-repo-dev" >> $GITHUB_ENV
            echo "CDK_STACK=ThreeTierStack-dev" >> $GITHUB_ENV
          fi
          echo "AWS_REGION=$AWS_REGION" >> $GITHUB_ENV
        shell: bash

      # 3. AWS OIDC 認証
      # AWSの永続的なアクセスキーを使わず、GitHub OIDCで一時的な認証情報を引き受けます（最小権限の原則）
      - name: Configure AWS credentials via OIDC
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ env.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}
          audience: sts.amazonaws.com

      # 4. Amazon ECR へのログイン
      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      # 5. Docker イメージのビルドとECRへのプッシュ
      - name: Build, tag, and push image to Amazon ECR
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          IMAGE_TAG: ${{ github.sha }}
        run: |
          # app フォルダ内の Dockerfile を読み取りビルドを実行
          docker build -t $ECR_REGISTRY/$ECR_REPO:$IMAGE_TAG ./app
          docker push $ECR_REGISTRY/$ECR_REPO:$IMAGE_TAG
          # 最新タグも追加で付与し、履歴としてプッシュ
          docker tag $ECR_REGISTRY/$ECR_REPO:$IMAGE_TAG $ECR_REGISTRY/$ECR_REPO:latest
          docker push $ECR_REGISTRY/$ECR_REPO:latest

      # 6. Node.js のセットアップ (CDK実行用)
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: './cdk-app/package-lock.json'

      # 7. CDK アプリの依存関係インストールとビルド
      - name: Install dependencies & Build
        run: |
          cd cdk-app
          npm ci
          npm run build

      # 8. AWS CDK デプロイによる Fargate サービスの更新
      # imageTag コンテキストパラメータとしてコミットSHAを渡し、ECSのタスク定義を更新します
      - name: Deploy CDK Stack
        run: |
          cd cdk-app
          npx cdk deploy ${{ env.CDK_STACK }} --require-approval never -c imageTag=${{ github.sha }}
