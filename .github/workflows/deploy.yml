name: Continuous Deployment

on:
  push:
    branches:
      - main
      - develop
      - 'release/*'

permissions:
  id-token: write # OIDC認証を使用するために必須
  contents: read  # リポジトリのチェックアウトに必須

jobs:
  deploy:
    name: Deploy to AWS Fargate
    runs-on: ubuntu-latest

    steps:
      # 1. リポジトリのチェックアウト
      - name: Checkout Code
        uses: actions/checkout@v4

      # 2. ブランチに基づくデプロイ環境の動的決定（本番・ステージング・開発環境の分離）
      # AWSアカウントIDやロールARNはSecretsから安全に取得します
      - name: Set Environment Variables
        run: |
          AWS_REGION="${{ secrets.AWS_REGION || 'ap-northeast-1' }}"
          echo "AWS_REGION=$AWS_REGION" >> $GITHUB_ENV
          
          if [ "${{ github.ref_name }}" = "main" ]; then
            ENV_NAME="prod"
            AWS_ROLE_ARN="${{ secrets.ROLE_ARN_PROD }}"
            ECR_REPO="app-repo-prod"
            CDK_STACK="ThreeTierStack-prod"
          elif [[ "${{ github.ref_name }}" =~ ^release/ ]]; then
            ENV_NAME="stg"
            AWS_ROLE_ARN="${{ secrets.ROLE_ARN_STG }}"
            ECR_REPO="app-repo-stg"
            CDK_STACK="ThreeTierStack-stg"
          else
            ENV_NAME="dev"
            AWS_ROLE_ARN="${{ secrets.ROLE_ARN_DEV }}"
            ECR_REPO="app-repo-dev"
            CDK_STACK="ThreeTierStack-dev"
          fi

          # Export variables to GITHUB_ENV
          echo "ENV_NAME=$ENV_NAME" >> $GITHUB_ENV
          echo "AWS_ROLE_ARN=$AWS_ROLE_ARN" >> $GITHUB_ENV
          echo "ECR_REPO=$ECR_REPO" >> $GITHUB_ENV
          echo "CDK_STACK=$CDK_STACK" >> $GITHUB_ENV

          # Dynamically extract 12-digit AWS Account ID from OIDC Role ARN
          AWS_ACCOUNT_ID=$(echo "$AWS_ROLE_ARN" | cut -d':' -f5)
          echo "AWS_ACCOUNT_ID=$AWS_ACCOUNT_ID" >> $GITHUB_ENV
        shell: bash

      # 2.5. Dockerfile Linter (Hadolint)
      - name: Lint Dockerfile
        uses: hadolint/hadolint-action@v3.1.0
        with:
          dockerfile: ./app/Dockerfile

      # 3. Docker  イメージのビルド検証 (プッシュはしない)
      - name: Build Docker image (Verification Only)
        run: |
          docker build -t app-image:${{ github.sha }} ./app

      # 3.5. Container Image Vulnerability Scan (Trivy)
      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: 'app-image:${{ github.sha }}'
          format: 'table'
          exit-code: '1'
          ignore-unfixed: true
          severity: 'CRITICAL,HIGH'

      # 4. Node.js のセットアップ (CDK実行用)
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: './infra/package-lock.json'

      # 5. CDK アプリの依存関係インストール、ビルド & テスト
      - name: Install dependencies, Build & Test
        run: |
          cd infra
          npm ci
          npm run build
          npm test

      # 6. AWS CDK によるシンセサイズ確認 (デプロイはしない)
      - name: Synthesize CDK Stack
        run: |
          cd infra
          npx cdk synth ${{ env.CDK_STACK }} \
            -c imageTag=${{ github.sha }} \
            -c natGateways=0
