name: Datadog Monitoring Deployment

on:
  push:
    branches:
      - main
      - develop
    paths:
      - 'cdktf-datadog/**'
  pull_request:
    paths:
      - 'cdktf-datadog/**'

permissions:
  contents: read

jobs:
  cdktf:
    name: CDKTF Diff or Deploy
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: cdktf-datadog
    env:
      TERRAFORM_STATE_BUCKET: ${{ secrets.TERRAFORM_STATE_BUCKET }}
      TERRAFORM_LOCK_TABLE: ${{ secrets.TERRAFORM_LOCK_TABLE }}
      TERRAFORM_STATE_REGION: ap-northeast-1
      AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
      AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
          cache-dependency-path: cdktf-datadog/package-lock.json

      - name: Install Dependencies
        run: npm ci

      - name: Compile TypeScript
        run: npm run compile

      - name: Install CDKTF CLI
        run: npm install --global cdktf-cli

      # PR 時は差分表示 (diff)
      - name: CDKTF Diff
        if: github.event_name == 'pull_request'
        run: cdktf diff
        env:
          DATADOG_API_KEY: ${{ secrets.DATADOG_API_KEY }}
          DATADOG_APP_KEY: ${{ secrets.DATADOG_APP_KEY }}
          APP_ENV: ${{ github.base_ref == 'main' && 'prod' || 'stg' }}

      # main または develop へのマージ（プッシュ）時は自動デプロイ
      - name: CDKTF Deploy
        if: github.event_name == 'push'
        run: cdktf deploy --auto-approve
        env:
          DATADOG_API_KEY: ${{ secrets.DATADOG_API_KEY }}
          DATADOG_APP_KEY: ${{ secrets.DATADOG_APP_KEY }}
          APP_ENV: ${{ github.ref_name == 'main' && 'prod' || github.ref_name == 'develop' && 'dev' || 'stg' }}
